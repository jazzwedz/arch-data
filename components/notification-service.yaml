id: notification-service
name: Notification Service
type: microservice
status: production
owner: platform-team
tags:
  - platform
  - messaging
  - email
  - sms
  - push
description:
  oneliner: Centralized system for sending notifications across all channels
  technical: Node.js microservice with template engine (Handlebars) and channel routing. Supports email (SendGrid), SMS (Twilio), push notifications (Firebase), in-app, and webhook. Priority queue with rate limiting per channel. Retry mechanism with exponential backoff. Delivery tracking and bounce handling.
  business: Ensures reliable delivery of transactional and marketing messages to customers. Unifies communication channels and enables business teams to manage templates without developer intervention.
interfaces:
  - direction: provides
    type: rest
    description: REST API pre priame odoslanie notifikacie a spravu sablon
  - direction: consumes
    type: async
    target: event-bus
    description: Pocuva domenove eventy a triggeruje prislusne notifikacie
  - direction: consumes
    type: rest
    target: sendgrid-api
    description: SendGrid API pre odosielanie emailov
  - direction: provides
    type: async
    description: Publishes notification delivery events and status updates
  - direction: consumes
    type: db
    target: redis-cache
    description: Template cache and delivery deduplication
risks:
  - Spam protection - misconfiguration can cause mass sending
  - Email deliverability depends on domain reputation and SPF/DKIM configuration
  - GDPR - must respect customer opt-out preferences
diagram:
  color: '#EC4899'
  shape: rectangle
relationships:
  - target: notification-db
    type: depends-on
    connector: db
  - target: event-bus
    type: depends-on
    connector: async
  - target: redis-cache
    type: depends-on
    connector: db
  - target: eod-reconciliation
    type: communicates-with
    connector: rest
    description: Receives break alert triggers from reconciliation
