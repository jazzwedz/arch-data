id: api-gateway
name: API Gateway
type: gateway
status: production
owner: platform-team
tags:
  - core
  - networking
  - security
  - ingress
description:
  oneliner: Central entry point for all API requests
  technical: Kong-based API gateway with rate limiting, JWT validation, request/response transformations, and circuit breaker pattern. Runs as a Kubernetes Ingress controller with horizontal scaling. Supports canary deployments and A/B routing.
  business: Ensures that all external and internal requests to the system pass through a single controlled point, increasing security and enabling comprehensive traffic monitoring.
interfaces:
  - direction: provides
    type: rest
    description: Proxy pre vsetky downstream REST API endpointy
  - direction: provides
    type: grpc
    description: gRPC reverse proxy pre interne sluzby
  - direction: consumes
    type: rest
    target: identity-service
    description: Validacia JWT tokenov
  - direction: consumes
    type: db
    target: redis-cache
    description: Rate limiting counters and session cache
risks:
  - Single point of failure - gateway outage means full system outage
  - High throughput requires regular load testing
  - Routing rule configuration is complex and error-prone
diagram:
  color: '#3B82F6'
  shape: hexagon
relationships:
  - target: identity-service
    type: depends-on
    connector: rest
  - target: redis-cache
    type: depends-on
    connector: db
  - target: config-db
    type: depends-on
    connector: db
  - target: session-cache
    type: depends-on
    connector: db
    description: Rate limiting counters
  - target: auth-service
    type: communicates-with
    connector: rest
    description: JWT validation on each request
