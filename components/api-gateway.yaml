id: api-gateway
name: API Gateway
type: gateway
status: production
owner: platform-team
tags:
  - core
  - networking
  - security
  - ingress
description:
  oneliner: Centralny vstupny bod pre vsetky API poziadavky
  technical: Kong-based API gateway s rate limiting, JWT validaciou, request/response transformaciami a circuit breaker patternom. Bezi ako Kubernetes Ingress controller s horizontalnym skalovanim.
  business: Zabezpecuje, ze vsetky externe a interne poziadavky na system prechadzaju cez jeden kontrolovany bod.
interfaces:
  - direction: provides
    type: rest
    description: Proxy pre vsetky downstream REST API endpointy
  - direction: provides
    type: grpc
    description: gRPC reverse proxy pre interne sluzby
  - direction: consumes
    type: rest
    target: identity-service
    description: Validacia JWT tokenov
dependencies:
  - id: identity-service
    connector: rest
  - id: redis-cache
    connector: db
  - id: config-db
    connector: db
risks:
  - Single point of failure
  - Vysoky throughput vyzaduje pravidelne zatazove testy
diagram:
  color: '#3B82F6'
  shape: hexagon
