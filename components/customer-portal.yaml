id: customer-portal
name: Customer Portal
type: frontend
status: production
owner: frontend-team
tags:
  - frontend
  - customer-facing
  - ux
description:
  oneliner: Web application for customers to manage their account and services
  technical: Next.js 14 application with App Router, server-side rendering and React Server Components. Uses Tailwind CSS + shadcn/ui design system. State managed via TanStack Query with optimistic updates. Monitoring via Sentry, analytics via Segment.
  business: Primary digital channel for customers to manage their account, view invoices, submit requests, and communicate with support. Directly impacts customer satisfaction and retention.
interfaces:
  - direction: provides
    type: human
    description: Webové rozhranie pre zákazníkov (responsive, WCAG 2.1 AA)
  - direction: consumes
    type: rest
    target: api-gateway
    description: Všetky API volania cez centrálny gateway
  - direction: consumes
    type: rest
    target: identity-service
    description: User login and authentication
dependencies:
  - id: api-gateway
    connector: rest
  - id: identity-service
    connector: rest
  - id: cdn-service
    connector: rest
risks:
  - XSS and CSRF vulnerabilities - requires regular penetration testing
  - Portal outage directly impacts customer experience and NPS
  - Large bundle size may cause slow loading on lower-end devices
diagram:
  color: '#8B5CF6'
  shape: rectangle
