description:
  oneliner: Web application for customers to manage their account and services
  technical: Next.js 14 application with App Router, server-side rendering and React Server Components. Uses Tailwind CSS + shadcn/ui design system. State managed via TanStack Query with optimistic updates. Monitoring via Sentry, analytics via Segment.
  business: Primary digital channel for customers to manage their account, view invoices, submit requests, and communicate with support. Directly impacts customer satisfaction and retention.
