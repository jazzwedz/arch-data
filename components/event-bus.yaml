id: event-bus
name: Enterprise Event Bus
type: queue
status: production
owner: platform-team
tags:
  - core
  - infrastructure
  - messaging
  - kafka
description:
  oneliner: Central message broker platform for asynchronous communication
  technical: Apache Kafka cluster (3 brokers, 3 ZooKeeper nodes) with Confluent Schema Registry for Avro schemas. Replication factor 3, min.insync.replicas=2. Retention policy 7 days for most topics, 90 days for audit topics. Kafka Connect for CDC from databases. Monitoring via Confluent Control Center.
  business: Enables individual systems to communicate asynchronously and independently, increasing overall system resilience against outages. Ensures that no message is lost.
interfaces:
  - direction: provides
    type: async
    description: Kafka topics pre publish/subscribe messaging s guaranteed delivery
  - direction: provides
    type: rest
    description: Schema Registry REST API pre registráciu a validáciu schém
dependencies: []
risks:
  - Kafka cluster outage affects all asynchronous communication in the system
  - Schema evolution must be backward compatible, otherwise it breaks consumers
  - Disk space - without monitoring, retention policy can fill up storage
diagram:
  color: '#F97316'
  shape: cylinder
