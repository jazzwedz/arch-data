id: user-db
name: User Database
type: database
status: production
owner: platform-team
tags:
  - database
  - core
  - postgresql
description:
  oneliner: PostgreSQL database storing user accounts and profiles
  technical: >-
    PostgreSQL 15 instance on AWS RDS. Stores user credentials (bcrypt hashed),
    profile data, roles, permissions, and session metadata. Automated daily
    backups with 30-day retention. Read replica for reporting queries.
    Connection pooling via PgBouncer.
  business: >-
    Central store for all user information. Ensures data integrity and
    supports compliance requirements for data retention and audit trails.
interfaces:
  - direction: provides
    type: db
    description: PostgreSQL connection on port 5432
dependencies: []
risks:
  - Data loss if backup restoration fails
  - Connection pool exhaustion under high load
diagram:
  color: "#E8F5E9"