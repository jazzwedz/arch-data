id: user-db
name: User Database
type: database
status: production
owner: dba-team
tags:
  - database
  - postgresql
  - core
  - pii
description:
  oneliner: Primary database for user data and identities
  technical: PostgreSQL 16 with pgcrypto for PII column encryption. Primary-replica setup with streaming replication and automatic failover via Patroni. Row-level security for multi-tenant isolation. Automated backups every 6 hours to S3 with point-in-time recovery. Connection pooling via PgBouncer.
  business: Stores all customer data including personal information. Subject to strict security and compliance requirements (GDPR, SOC 2). Availability of this database is critical for the entire system.
interfaces:
  - direction: provides
    type: db
    description: PostgreSQL wire protocol na porte 5432 cez PgBouncer pool
dependencies: []
risks:
  - Data loss is a catastrophic scenario - RPO must be < 1 hour
  - GDPR right to erasure requires cascading deletion across all dependent tables
  - Database migrations on large tables can cause lock contention
diagram:
  color: '#06B6D4'
  shape: cylinder
