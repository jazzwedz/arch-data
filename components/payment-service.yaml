id: payment-service
name: Payment Processing Service
type: microservice
status: production
owner: fintech-team
tags:
  - core
  - financial
  - pci-dss
  - compliance
description:
  oneliner: Processing payments, refunds and financial transactions
  technical: Go microservice in a PCI DSS Level 1 compliant environment. Integrates Stripe, PayPal and bank transfers via adapter pattern. Idempotent processing with deduplication key. Two-phase commit for critical transactions. Sensitive data encrypted via AWS KMS, no PAN data in logs.
  business: Ensures secure and reliable payment processing from customers. Supports multiple payment methods and automatic refunds. Directly impacts cash flow and compliance.
interfaces:
  - direction: provides
    type: rest
    description: Payment API Ã¢â‚¬â€œ initiate, capture, refund, status
  - direction: provides
    type: async
    description: Eventy payment.completed, payment.failed, refund.processed na Kafka
  - direction: consumes
    type: rest
    target: stripe-api
    description: Stripe API pre kartovÃƒÂ© platby
  - direction: consumes
    type: async
    target: event-bus
    description: Publishes payment confirmation and failure events
  - direction: consumes
    type: db
    target: redis-cache
    description: Idempotency keys and transaction deduplication cache
risks:
  - PCI DSS non-compliance can lead to loss of payment processing license
  - Double-charge scenario on network timeout - idempotency is critical
  - Payment provider outage requires automatic failover
diagram:
  color: '#10B981'
  shape: rectangle
