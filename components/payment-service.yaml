id: payment-service
name: Payment Processing Service
type: microservice
status: production
owner: fintech-team
tags:
  - core
  - financial
  - pci-dss
  - compliance
description:
  oneliner: Spracovanie platieb, refundov a finančných transakcií
  technical: Go microservice v PCI DSS Level 1 compliant prostredí. Integruje Stripe, PayPal a bankové prevody cez adapter pattern. Idempotentné spracovanie s deduplication key. Dvojfázový commit pre kritické transakcie. Citlivé dáta šifrované cez AWS KMS, žiadne PAN dáta v logoch.
  business: Zabezpečuje bezpečné a spoľahlivé spracovanie platieb od zákazníkov. Podporuje viaceré platobné metódy a automatické refundy. Priamo ovplyvňuje cash flow a compliance.
interfaces:
  - direction: provides
    type: rest
    description: Payment API – initiate, capture, refund, status
  - direction: provides
    type: async
    description: Eventy payment.completed, payment.failed, refund.processed na Kafka
  - direction: consumes
    type: rest
    target: stripe-api
    description: Stripe API pre kartové platby
dependencies:
  - id: payment-db
    connector: db
  - id: stripe-api
    connector: rest
  - id: event-bus
    connector: async
  - id: redis-cache
    connector: db
risks:
  - PCI DSS non-compliance môže viesť k strate licencie na spracovanie platieb
  - Double-charge scenár pri network timeout – idempotencia je kritická
  - Výpadok payment providera vyžaduje automatický failover
diagram:
  color: '#10B981'
  shape: rectangle
