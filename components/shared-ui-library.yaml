description:
  oneliner: Shared UI component library and design tokens
  technical: React component library built with Vite in library mode, published as a private NPM package (@company/ui). Based on Radix UI primitives with Tailwind CSS. Contains 60+ components, design tokens, icons, and utility hooks. Storybook for documentation and visual tests. Chromatic for visual regression testing. Semantic versioning with changelog.
  business: Ensures consistent visual style and user experience across all frontend applications. Accelerates development of new features by providing ready-made UI building blocks.
