id: identity-service
name: Identity & Access Management
type: microservice
status: production
owner: security-team
tags:
  - security
  - auth
  - core
  - compliance
description:
  oneliner: Identity management, authentication and authorization of users
  technical: OAuth 2.0 / OpenID Connect provider built on Keycloak with custom SPI plugins. Supports SAML 2.0 federation for enterprise SSO, MFA via TOTP and WebAuthn, RBAC with hierarchical roles and ABAC policies. Stores identities in PostgreSQL, sessions in Redis.
  business: Ensures that only authorized users with verified identities can access the system. Supports corporate SSO and multi-factor authentication per compliance requirements.
interfaces:
  - direction: provides
    type: rest
    description: OAuth 2.0 endpointy – /authorize, /token, /userinfo, /introspect
  - direction: provides
    type: rest
    description: Admin REST API pre správu používateľov, rolí a klientov
  - direction: provides
    type: async
    description: 'Eventy pri login, logout, zmene role (Kafka topic: identity.events)'
  - direction: consumes
    type: db
    target: user-db
    description: Reads and writes user credentials and profile data
  - direction: consumes
    type: db
    target: redis-cache
    description: Session token cache and rate limiting
  - direction: consumes
    type: async
    target: notification-service
    description: Triggers notifications for login alerts and password resets
dependencies:
  - id: user-db
    connector: db
  - id: redis-cache
    connector: db
  - id: notification-service
    connector: async
risks:
  - Compromise of this service endangers the entire system - requires regular security audit
  - Identity provider migration is high-risk and complex
  - GDPR - storing PII requires encryption at-rest and audit logging
diagram:
  color: '#EF4444'
  shape: rectangle
