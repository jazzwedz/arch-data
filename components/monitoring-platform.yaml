id: monitoring-platform
name: Observability Platform
type: platform
status: production
owner: sre-team
tags:
  - observability
  - monitoring
  - logging
  - tracing
  - alerting
description:
  oneliner: Central platform for monitoring, logging, tracing and alerting
  technical: 'Stack: Prometheus + Grafana for metrics, ELK (Elasticsearch, Logstash, Kibana) for logs, Jaeger for distributed tracing. OpenTelemetry Collector as unified ingestion point. PagerDuty integration for on-call alerting. Custom Grafana dashboards for SLI/SLO tracking. Retention policy: metrics 90 days, logs 30 days, traces 7 days.'
  business: Provides real-time visibility into the health and performance of the entire system. Enables rapid detection and diagnosis of issues, minimizing the impact of outages on customers and business.
interfaces:
  - direction: provides
    type: human
    description: Grafana dashboardy a Kibana pre vizualizáciu a analýzu
  - direction: provides
    type: rest
    description: Prometheus remote write API a OpenTelemetry OTLP endpoint
  - direction: consumes
    type: rest
    target: pagerduty-api
    description: PagerDuty API pre eskaláciu alertov na on-call tím
dependencies: []
risks:
  - Monitoring outage means other outages go undetected
  - High log volume can cause cost explosion on Elasticsearch cluster
  - Alert fatigue from poorly configured thresholds reduces team response time
diagram:
  color: '#6366F1'
  shape: rectangle
