id: order-service
name: Order Management Service
type: microservice
status: production
owner: commerce-team
tags:
  - core
  - business-logic
  - transactions
description:
  oneliner: Processing and managing the order lifecycle
  technical: Java 21 / Spring Boot 3 microservice implementing the Saga pattern for distributed transactions. Order state machine (created -> confirmed -> processing -> shipped -> delivered / cancelled). Event sourcing with CQRS for audit trail. Horizontally scalable, runs in Kubernetes.
  business: Core business process engine - manages the entire order lifecycle from creation through payment to delivery. Critical for revenue and customer satisfaction.
interfaces:
  - direction: provides
    type: rest
    description: CRUD API pre objednávky s filtrovaním, stránkovaním a full-text search
  - direction: provides
    type: async
    description: Doménové eventy (order.created, order.confirmed, order.shipped) na Kafka
  - direction: consumes
    type: async
    target: payment-service
    description: Počúva payment.completed a payment.failed eventy
  - direction: consumes
    type: rest
    target: inventory-service
    description: Overenie dostupnosti produktov pred potvrdením objednávky
  - direction: consumes
    type: async
    target: notification-service
    description: Triggers order confirmation and status update notifications
  - direction: consumes
    type: async
    target: event-bus
    description: Publishes order lifecycle events
dependencies:
  - id: order-db
    connector: db
  - id: payment-service
    connector: async
  - id: notification-service
    connector: async
  - id: event-bus
    connector: async
risks:
  - Lost order means direct financial loss - requires exactly-once processing
  - Saga rollback can fail and create inconsistent state
  - High load during seasonal peaks (Black Friday, Christmas)
diagram:
  color: '#F59E0B'
  shape: rectangle
