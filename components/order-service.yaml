id: order-service
name: Order Management Service
type: microservice
status: production
owner: commerce-team
tags:
  - core
  - business-logic
  - transactions
description:
  oneliner: Processing and managing the order lifecycle
  technical: Java 21 / Spring Boot 3 microservice implementing the Saga pattern for distributed transactions. Order state machine (created -> confirmed -> processing -> shipped -> delivered / cancelled). Event sourcing with CQRS for audit trail. Horizontally scalable, runs in Kubernetes.
  business: Core business process engine - manages the entire order lifecycle from creation through payment to delivery. Critical for revenue and customer satisfaction.
